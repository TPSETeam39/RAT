name: Build Multi-Platform Executables

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    strategy:
      matrix:
        os: [windows-latest, ubuntu-latest, macos-latest]

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"
          
      - name: Install system deps for wxPython
        run: |
         sudo apt-get update
         sudo apt-get install -y \
                  libgtk-3-0 \
                  libgtk-3-dev \
                  libgstreamer1.0-0 \
                  libgstreamer1.0-dev \
                  libgstreamer-plugins-base1.0-0 \
                  libgstreamer-plugins-base1.0-dev \
                  freeglut3-dev \
                  libsm6 \
                  libnotify-dev \
                  libwebkit2gtk-4.0-37-dev \
                  libjpeg-dev \
                  libtiff-dev \
                  libsdl2-dev
      
      - name: Install dependencies
        run: |
          pip install pyinstaller
          pip install wxPython
             
      # Build Linux/macOS executable
      - name: Build Linux/macOS executable
        if: matrix.os != 'windows-latest'
        run: pyinstaller --onefile src/rat/app.py --distpath dist/${{ matrix.os }} --paths src
        shell: bash

      # Build Windows executable
      - name: Build Windows executable
        if: matrix.os == 'windows-latest'
        run: pyinstaller app-win.spec --distpath dist/${{ matrix.os }}
        shell: pwsh

      # Upload artifact
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-${{ matrix.os }}
          path: dist/${{ matrix.os }}
